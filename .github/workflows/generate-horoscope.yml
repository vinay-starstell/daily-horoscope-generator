name: Generate Daily Horoscope

on:
  # schedule:
    # - cron: '0 9 20 * *'  
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, gd

      - name: Install Composer
        run: composer install --no-dev --prefer-dist

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          DIVINEAPI_AUTH_TOKEN="${{ secrets.DIVINEAPI_AUTH_TOKEN }}"
          DIVINEAPI_KEY="${{ secrets.DIVINEAPI_KEY }}"
          GMAIL_ADDRESS="${{ secrets.GMAIL_ADDRESS }}"
          GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}"
          ENVEOF

      - name: Generate English horoscope
        run: php src/DailyPredictionsAggregator.php

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: horoscope-${{ github.run_number }}
          path: daily_horoscope.xlsx
          retention-days: 30
