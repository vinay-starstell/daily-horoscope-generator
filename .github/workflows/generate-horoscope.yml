name: Generate Daily Horoscope

on:
  schedule:
    - cron: '0 9 20 * *'  # Runs on 20th of every month at 9 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist

      - name: Create .env file
        run: |
          cat > .env << 'ENVEOF'
          DIVINEAPI_AUTH_TOKEN=${{ secrets.DIVINEAPI_AUTH_TOKEN }}
          DIVINEAPI_KEY=${{ secrets.DIVINEAPI_KEY }}
          GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          ENVEOF

      - name: Run horoscope generator
        run: php src/DailyPredictionsAggregator.php

      - name: Upload as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: daily_horoscope
          path: daily_horoscope.xlsx

      - name: Commit and push file (optional backup to repo)
        if: success()
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add daily_horoscope.xlsx
          git commit -m "Generated horoscope file - $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push || echo "Nothing to push"
